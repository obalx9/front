version: '3.8'

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${API_URL:-http://localhost:3000}
        VITE_VK_CLIENT_ID: ${VK_CLIENT_ID}
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - keykurs-network

networks:
  keykurs-network:
    driver: bridge
